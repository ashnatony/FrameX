<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScreenX - Upload SRT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        input[type="file"] {
            width: 100%;
            padding: 15px;
            border: 2px dashed #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        input[type="file"]:hover {
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result h2 {
            color: #333;
            margin-bottom: 15px;
        }

        .result pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            color: #555;
            line-height: 1.6;
        }

        .loading {
            text-align: center;
            color: #667eea;
            margin-top: 20px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .info {
            background: #e3f2fd;
            color: #1565c0;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .info code {
            background: #bbdefb;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }

        .file-info {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }

        .file-info.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 ScreenX</h1>
        <p class="subtitle">Upload SRT subtitle and generate movie script using AI</p>

        <div class="info">
            <strong>📝 Instructions:</strong>
            <br>1. Enter the movie name
            <br>2. Upload your SRT subtitle file
            <br>3. Click Generate Script
            <br><br>Server: <code>http://localhost:3000</code>
        </div>

        <div class="input-group">
            <label for="movieName">Movie Name</label>
            <input 
                type="text" 
                id="movieName" 
                placeholder="Enter movie name (e.g., Aadu 1, Aadu 2)" 
                autocomplete="off"
            >
        </div>

        <div class="input-group">
            <label for="srtFile">SRT Subtitle File</label>
            <input 
                type="file" 
                id="srtFile" 
                accept=".srt"
                onchange="showFileInfo()"
            >
            <div class="file-info" id="fileInfo"></div>
        </div>

        <button id="generateBtn" onclick="generateScript()">
            ✨ Generate Script
        </button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Generating script... This may take a minute</p>
        </div>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <h2>Generated Script:</h2>
            <pre id="scriptContent"></pre>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';

        function showFileInfo() {
            const fileInput = document.getElementById('srtFile');
            const fileInfo = document.getElementById('fileInfo');
            
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
                fileInfo.textContent = `📁 ${file.name} (${sizeMB} MB)`;
                fileInfo.classList.add('show');
            } else {
                fileInfo.classList.remove('show');
            }
        }

        async function generateScript() {
            const movieName = document.getElementById('movieName').value.trim();
            const fileInput = document.getElementById('srtFile');
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const result = document.getElementById('result');
            const btn = document.getElementById('generateBtn');
            const scriptContent = document.getElementById('scriptContent');

            // Validate input
            if (!movieName) {
                showError('Please enter a movie name');
                return;
            }

            if (!fileInput.files || fileInput.files.length === 0) {
                showError('Please select an SRT file');
                return;
            }

            // Reset UI
            loading.classList.add('show');
            error.classList.remove('show');
            result.classList.remove('show');
            btn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('movieName', movieName);
                formData.append('srtFile', fileInput.files[0]);

                const response = await fetch(`${API_URL}/movie/generate-script`, {
                    method: 'POST',
                    body: formData,
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Failed to generate script');
                }

                // Show result
                scriptContent.textContent = data.script;
                result.classList.add('show');
                
            } catch (err) {
                showError(err.message);
            } finally {
                loading.classList.remove('show');
                btn.disabled = false;
            }
        }

        function showError(message) {
            const error = document.getElementById('error');
            error.textContent = '❌ Error: ' + message;
            error.classList.add('show');
        }
    </script>
</body>
</html>
